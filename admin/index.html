<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmaline Admin</title>
<link rel="icon" href="../static/images/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="loginScreen" class="login-screen">
  <img src="../static/images/logo.svg" alt="Pharmaline">
  <h1 id="loginTitle">Pharmaline Admin</h1>
  <p id="loginSubtitle">Sign in to manage your catalog.</p>

  <form id="loginForm" style="display:flex; flex-direction:column; gap:12px; width:280px;">
    <input type="email" id="loginEmail" placeholder="Email address" required style="padding:12px 16px; border-radius:8px; border:none;">
    <input type="password" id="loginPassword" placeholder="Password" required style="padding:12px 16px; border-radius:8px; border:none;">
    <button type="submit" class="btn-login" id="loginSubmitBtn">Log In</button>
  </form>
  <p class="status-msg" id="loginStatus" style="color:#fff;"></p>
</div>

<div id="app" style="display:none;">
  <header class="admin-header">
    <div class="admin-header__brand">
      <img src="../static/images/logo.svg" alt="">
      Pharmaline Admin
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button id="manageUsersBtn" style="display:none;">Manage Users</button>
      <button id="logoutBtn">Log Out</button>
    </div>
  </header>

  <div class="dashboard">
    <div class="filter-tabs" style="margin-bottom:24px;">
      <button id="viewProductsBtn" class="active">📦 Products</button>
      <button id="viewCustomersBtn">👤 Customers</button>
      <button id="viewQuotesBtn">📋 Quote Requests</button>
      <button id="viewMessagesBtn">✉️ Messages</button>
      <button id="viewInvoicesBtn">🧾 Invoices</button>
    </div>

    <div id="productsView">
      <div class="stats-row" id="statsRow"></div>
      <div class="toolbar-row">
        <div class="filter-tabs" id="filterTabs"></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <input type="text" id="searchInput" placeholder="Search products...">
          <button class="btn-secondary" id="clearSalesBtn">Clear All Specials</button>
          <button class="btn-secondary" id="enrichAllBtn">✨ AI Enrich All Products</button>
          <button class="btn-primary" id="addProductBtn">+ Add Product</button>
        </div>
      </div>
      <div class="admin-product-grid" id="productGrid"></div>
    </div>

    <div id="customersView" style="display:none;">
      <div class="toolbar-row">
        <div></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <input type="text" id="customerSearchInput" placeholder="Search customers...">
          <button class="btn-secondary" id="importCsvBtn">📄 Import Spreadsheet</button>
          <button class="btn-secondary" id="importInvoicePhotoBtn">📷 Read Invoice Photo</button>
          <button class="btn-primary" id="addCustomerBtn">+ Add Customer</button>
        </div>
      </div>
      <div id="customerList"></div>
    </div>

    <div id="quotesView" style="display:none;">
      <div id="quotesList"></div>
    </div>

    <div id="messagesView" style="display:none;">
      <div id="messagesList"></div>
    </div>

    <div id="invoicesView" style="display:none;">
      <div class="toolbar-row">
        <div></div>
        <button class="btn-primary" id="createInvoiceBtn">+ Create Invoice</button>
      </div>
      <div id="invoicesList"></div>
    </div>
  </div>
</div>

<div id="printInvoiceArea"></div>

<div id="modalRoot"></div>
<div id="spinner" class="spinner-overlay" style="display:none;">Working...</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
