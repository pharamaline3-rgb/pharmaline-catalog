backend:
  name: github
  repo: pharamaline3-rgb/pharmaline-catalog
  branch: main
  base_url: https://pharmaline-oauth.pharamaline3.workers.dev

media_folder: "static/images/products"
public_folder: "static/images/products"

collections:
  - name: "products"
    label: "Products"
    folder: "content/products"
    create: true
    slug: "{{fields.sku}}"
    identifier_field: sku
    fields:
      - { label: "SKU (Product Number)", name: "sku", widget: "string", default: "{{fields.sku}}", hint: "Leave the auto-filled number, or see note below." }
      - { label: "Category", name: "category", widget: "select", options: ["health", "beauty", "food"] }
      - { label: "On Sale / Special", name: "sale", widget: "boolean", default: false }
      - { label: "Product Name (English)", name: "name_en", widget: "string" }
      - { label: "Product Name (French)", name: "name_fr", widget: "string" }
      - { label: "Description (English)", name: "description_en", widget: "text" }
      - { label: "Description (French)", name: "description_fr", widget: "text" }
      - { label: "Size / Amount", name: "unit_size", widget: "string", hint: "e.g. 250, 90, 500" }
      - { label: "Unit", name: "unit_type", widget: "select", options: ["ml", "L", "g", "kg", "oz", "capsules", "tablets", "units"] }
      - { label: "Units per Case", name: "case_qty", widget: "number", value_type: "int" }
      - { label: "Cases per Pallet", name: "pallet_qty", widget: "number", value_type: "int" }
      - { label: "Images", name: "images", widget: "list", field: { label: "Image", name: "image", widget: "image" } }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "Contact Info"
        file: "data/settings.json"
        fields:
          - { label: "Phone (for links, e.g. +15145550123)", name: "phone", widget: "string" }
          - { label: "Phone (displayed to visitors)", name: "phone_display", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }